name: Kotlin Forced-Mode Preview

on:
  pull_request:
    branches: [main]
    paths:
      - 'gitnexus/src/core/ingestion/languages/kotlin/**'
      - 'gitnexus/src/core/ingestion/scope-resolution/pipeline/registry.ts'
      - 'gitnexus/test/integration/resolvers/kotlin.test.ts'

permissions:
  contents: read

jobs:
  kotlin-forced-preview:
    name: kotlin forced-mode preview
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-gitnexus
        with:
          build: 'true'

      - name: Run forced Kotlin resolver tests (non-blocking)
        id: preview
        shell: bash
        continue-on-error: true
        working-directory: gitnexus
        run: >-
          REGISTRY_PRIMARY_KOTLIN=1
          npx vitest run test/integration/resolvers/kotlin.test.ts
          --reporter=default
          --reporter=json
          --outputFile=kotlin-forced-preview-results.json

      - name: Publish Kotlin forced-mode preview summary
        if: always()
        shell: bash
        working-directory: gitnexus
        run: |
          set -euo pipefail

          RESULT_FILE="kotlin-forced-preview-results.json"
          TOTAL=0
          PASSED=0
          FAILED=0
          SKIPPED=0

          if [[ -f "$RESULT_FILE" ]]; then
            TOTAL=$(jq -r '.numTotalTests // 0' "$RESULT_FILE")
            PASSED=$(jq -r '.numPassedTests // 0' "$RESULT_FILE")
            FAILED=$(jq -r '.numFailedTests // 0' "$RESULT_FILE")
            SKIPPED=$(jq -r '.numPendingTests // 0' "$RESULT_FILE")
          else
            echo "::warning title=Kotlin forced-mode preview::Result JSON not found (${RESULT_FILE})"
          fi

          {
            echo "### Kotlin forced-mode preview (\`REGISTRY_PRIMARY_KOTLIN=1\`)"
            echo ""
            echo "| Total | Passed | Failed | Skipped |"
            echo "|------:|-------:|-------:|--------:|"
            echo "| ${TOTAL} | ${PASSED} | ${FAILED} | ${SKIPPED} |"
            echo ""
            echo "Non-blocking preview only. Scope-parity required gate remains unchanged."
          } >> "$GITHUB_STEP_SUMMARY"

          echo "::notice title=Kotlin forced-mode preview::total=${TOTAL}, passed=${PASSED}, failed=${FAILED}, skipped=${SKIPPED}"
